---
# Secret — create once with:
#   kubectl create secret generic apt-ui-secrets \
#     --from-literal=ssh-private-key="$(cat ~/.ssh/id_ed25519)" \
#     --from-literal=jwt-secret="$(openssl rand -hex 32)" \
#     --from-literal=ts-authkey="tskey-client-..."  # optional, for Tailscale
apiVersion: v1
kind: Secret
metadata:
  name: apt-ui-secrets
  namespace: default
type: Opaque
stringData:
  ssh-private-key: ""   # fill in or use kubectl create secret
  jwt-secret: ""        # fill in or use kubectl create secret
  ts-authkey: ""        # Tailscale auth key — only needed if using Tailscale sidecar

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apt-ui-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn   # change to your storage class if not using Longhorn
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apt-ui
  namespace: default
  labels:
    app: apt-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apt-ui
  template:
    metadata:
      labels:
        app: apt-ui
    spec:
      containers:
        - name: apt-ui
          image: apt-ui:latest   # replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SSH_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: apt-ui-secrets
                  key: ssh-private-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apt-ui-secrets
                  key: jwt-secret
            - name: TZ
              value: America/Montreal
            - name: DATABASE_PATH
              value: /data/apt-dashboard.db
          volumeMounts:
            - name: data
              mountPath: /data
            # Uncomment when using the Tailscale sidecar:
            # - name: tailscale-socket
            #   mountPath: /var/run/tailscale
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

        # ---------------------------------------------------------------------------
        # Tailscale sidecar (optional) — uncomment to join the pod to your tailnet.
        #
        # In Kubernetes all containers in a pod share the same network namespace,
        # so Tailscale handles ingress for the whole pod automatically.
        # No network_mode override is needed (unlike Docker Compose).
        #
        # tailscale-state PVC keeps the node identity across pod restarts so the
        # same tailnet hostname/IP is preserved. Without it the pod re-registers
        # as a new node on every restart.
        # ---------------------------------------------------------------------------
        # - name: tailscale
        #   image: tailscale/tailscale:latest
        #   env:
        #     - name: TS_AUTHKEY
        #       valueFrom:
        #         secretKeyRef:
        #           name: apt-ui-secrets
        #           key: ts-authkey
        #     - name: TS_STATE_DIR
        #       value: /var/lib/tailscale
        #     - name: TS_HOSTNAME
        #       value: apt-ui
        #     - name: TS_USERSPACE
        #       value: "false"
        #     - name: TS_ACCEPT_DNS
        #       value: "false"
        #     # Uncomment to enable tailscale serve (HTTPS on tailnet):
        #     # - name: TS_SERVE_CONFIG
        #     #   value: /serve-config.json
        #   volumeMounts:
        #     - name: tailscale-state
        #       mountPath: /var/lib/tailscale
        #     - name: tailscale-socket
        #       mountPath: /var/run/tailscale
        #     # Uncomment to enable tailscale serve (mount the config from a ConfigMap):
        #     # - name: tailscale-serve-config
        #     #   mountPath: /serve-config.json
        #     #   subPath: tailscale-serve.json
        #   securityContext:
        #     capabilities:
        #       add:
        #         - NET_ADMIN
        #         - SYS_MODULE
        #   resources:
        #     requests:
        #       memory: "64Mi"
        #       cpu: "50m"
        #     limits:
        #       memory: "128Mi"
        #       cpu: "100m"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: apt-ui-data
        # Uncomment when using the Tailscale sidecar:
        # - name: tailscale-state
        #   persistentVolumeClaim:
        #     claimName: apt-ui-tailscale-state  # create separately, 100Mi is plenty
        # - name: tailscale-socket
        #   emptyDir: {}
        # - name: tailscale-serve-config
        #   configMap:
        #     name: apt-ui-tailscale-serve  # kubectl create configmap ... --from-file=tailscale-serve.json

---
apiVersion: v1
kind: Service
metadata:
  name: apt-ui
  namespace: default
  labels:
    app: apt-ui
spec:
  type: ClusterIP
  selector:
    app: apt-ui
  ports:
    - name: http
      port: 8000
      targetPort: 8000
