name: Build and push Docker image

on:
  release:
    types: [published]
  # Manual trigger so we can rebuild any existing tag (e.g. backfill an image
  # for a release whose original workflow run misconfigured tagging).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. 2026.05.01-02)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # On manual dispatch, check out the requested tag instead of the
          # default branch. On release: published, github.ref already points
          # at the tag, so this is a no-op there.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Use the literal git tag as the image tag — apt-ui uses date-based
          # versions like 2026.05.01-02 which aren't SemVer, so the prior
          # `type=semver` rules silently produced no version-tagged image.
          # On manual workflow_dispatch the input value drives the tag name.
          tags: |
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ github.event.inputs.tag || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
