services:
  apt-ui:
    image: ghcr.io/mzac/apt-ui:latest
    ports:
      - "8111:8000"
    environment:
      # --- Auth option 1: inline private key (key must have no passphrase) ---
      - SSH_PRIVATE_KEY=${SSH_PRIVATE_KEY}
      # --- Auth option 2: SSH agent (comment out SSH_PRIVATE_KEY and uncomment below) ---
      # - SSH_AUTH_SOCK=/run/ssh-agent.sock
      - TZ=America/Montreal
      # Optional overrides:
      # - JWT_SECRET=change-me-to-a-random-string
      # - ENCRYPTION_KEY=change-me-to-a-random-string  # encrypts per-server SSH keys in the DB (falls back to JWT_SECRET)
      # - LOG_LEVEL=INFO
    volumes:
      - apt-ui-data:/data
      # --- Required when using SSH agent (mount the host agent socket) ---
      # - ${SSH_AUTH_SOCK}:/run/ssh-agent.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  apt-ui-data:
